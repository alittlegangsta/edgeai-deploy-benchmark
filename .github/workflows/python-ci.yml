name: Python CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal test dependencies
        run: |
          python -m pip install \
            numpy==1.26.4 \
            onnx==1.16.2 \
            onnxruntime==1.18.1 \
            opencv-python-headless==4.10.0.84

      - name: Compile Python sources
        run: python -m py_compile $(git ls-files '*.py')

      - name: Run model-independent Python unittests
        env:
          PYTHONPATH: python
        run: |
          python -m unittest -v \
            tests/python/test_benchmark_stats.py \
            tests/python/test_letterbox.py \
            tests/python/test_model_contract.py \
            tests/python/test_ort_tensor_baseline.py \
            tests/python/test_postprocess.py \
            tests/python/test_python_single_image_cli.py
